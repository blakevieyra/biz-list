# For detailed reference, see https://supabase.com/docs/guides/local-development/cli/config
project_id = "all-connect"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "https://all-connect-seven.vercel.app"
additional_redirect_urls = [
  "http://localhost:3000/auth/callback",
  "https://all-connect-seven.vercel.app/auth/callback",
  "https://*.vercel.app/auth/callback"
]

[auth.email]
enable_signup = true
enable_confirmations = false
